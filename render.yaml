services:
  - type: web
    name: gamegold-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB
        value: gamegold
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: LLM_API_KEY
        sync: false # paste your Groq key (gsk_...) here in the Render dashboard
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: '["https://gamegold.vercel.app"]'
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "none"
      - key: DEBUG
        value: "false"
